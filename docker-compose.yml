services:
  ui:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./ui:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - ./app/.env
    # Supabase runs separately via `supabase start` on the host.
    # DATABASE_URL in .env should point to host.docker.internal (Mac/Win)
    # or the gateway IP (Linux) instead of 127.0.0.1.
    # Example: postgresql://postgres:postgres@host.docker.internal:54322/postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
